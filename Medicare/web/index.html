<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Flutter Web — base href is replaced by flutter build.
    Do not modify the line below.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="Medicare — Hospital management dashboard for admins, doctors, nurses and receptionists.">
  <meta name="theme-color" content="#1976D2">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Medicare">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Medicare — Hospital Admin</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Injected by flutter build — do not modify.
    const serviceWorkerVersion = {{flutter_service_worker_version}};
  </script>
  <script src="flutter_bootstrap.js" async></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #flutter-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #flutter-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-logo {
      width: 72px;
      height: 72px;
      margin-bottom: 28px;
    }

    .loader-title {
      font-size: 22px;
      font-weight: 600;
      color: #1976D2;
      letter-spacing: 0.5px;
      margin-bottom: 32px;
    }

    /* Animated ring spinner */
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #e3eaf3;
      border-top-color: #1976D2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="flutter-loader">
    <img src="icons/Icon-192.png" alt="Medicare" class="loader-logo">
    <span class="loader-title">Medicare</span>
    <div class="spinner"></div>
  </div>

  <script>
    // Fade out and remove the loader once Flutter signals it is ready.
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('flutter-loader');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function () { loader.remove(); }, 450);
      }
    });
  </script>

</body>
</html>
